<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FPV Pilot: Urban Seeker</title>
    <style>
        * { 
            margin: 0; padding: 0; 
            user-select: none; -webkit-user-select: none;
            touch-action: none; 
        }
        body { background: #020202; font-family: monospace; overflow: hidden; }
        canvas { display: block; }
        
        .osd-panel {
            position: absolute; top: 20px;
            color: #00ff00; z-index: 5; font-size: 11px;
            pointer-events: none;
            background: rgba(0, 30, 0, 0.5);
            padding: 10px;
            border: 1px solid rgba(0,255,0,0.2);
        }

        #osd-left { left: 20px; }
        #osd-right { right: 20px; width: 120px; height: 120px; }

        #minimap-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #minimap-canvas { background: transparent; }
        #minimap-arrow {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 8px solid #00ff00;
            transform: translate(-50%, -50%);
        }

        #target-ui {
            position: absolute; width: 60px; height: 60px;
            border: 2px solid #ff0000; border-radius: 50%;
            display: none; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #target-ui::after {
            content: 'LOCK'; position: absolute; top: -20px; left: 50%;
            transform: translateX(-50%); color: #ff0000; font-size: 10px;
        }

        #hit-marker {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%); color: #ff0000;
            font-size: 20px; display: none; z-index: 100; font-weight: bold;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 30px; height: 30px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            transform: translate(-50%, -50%); pointer-events: none;
        }

        #joystick-left, #joystick-right {
            position: absolute; bottom: 10%;
            width: 140px; height: 140px; z-index: 20; opacity: 0.6;
        }
        #joystick-left { left: 5%; }
        #joystick-right { right: 5%; }

        #restart-screen {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            display: none; z-index: 100; color: #ff0000;
            background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #ff0000;
        }
        button {
            background: #ff0000; color: white; border: none;
            padding: 12px 25px; font-family: monospace;
            cursor: pointer; font-size: 18px; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="osd-left" class="osd-panel">
        <div>MOD: ACRO_STAB</div>
        <div id="score">SCORE: 0</div>
        <div id="alt">ALT: 0.0m</div>
        <div id="spd">SPD: 0km/h</div>
    </div>

    <div id="osd-right" class="osd-panel">
        <div id="minimap-container">
            <canvas id="minimap-canvas"></canvas>
            <div id="minimap-arrow"></div>
        </div>
    </div>

    <div id="target-ui"></div>
    <div id="hit-marker">TARGET NEUTRALIZED</div>
    <div id="crosshair"></div>
    <div id="joystick-left"></div>
    <div id="joystick-right"></div>

    <div id="restart-screen">
        <h1 id="res-msg">LOST TELEMETRY</h1>
        <button onclick="location.reload()">RE-LINK DRONE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        const PHYSICS = { acceleration: 75.0, friction: 0.97, rotationSpeed: 3.5, tiltMax: 0.7, lift: 50.0 };
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.003);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        let score = 0;
        let isGameOver = false;

        const droneState = { pos: new THREE.Vector3(0, 5, 0), vel: new THREE.Vector3(0, 0, 0), rotY: 0, tiltX: 0, tiltZ: 0 };
        let droneGroup, gridHelper;
        const entities = [];
        const staticObstacles = [];
        const activeChunks = new Set();
        const CHUNK_SIZE = 200;

        const mCanvas = document.getElementById('minimap-canvas');
        const mCtx = mCanvas.getContext('2d');
        mCanvas.width = 120; mCanvas.height = 120;

        function createGround() {
            const groundGeo = new THREE.PlaneGeometry(5000, 5000);
            const groundMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            scene.add(ground);

            // Инициализация сетки
            gridHelper = new THREE.GridHelper(5000, 500, 0x00ff00, 0x004400);
            scene.add(gridHelper);
        }

        function createDroneModel() {
            droneGroup = new THREE.Group();
            const frameMat = new THREE.LineBasicMaterial({ color: 0x00ff00 });
            const points = [new THREE.Vector3(-0.8, 0, -0.8), new THREE.Vector3(0.8, 0, 0.8), new THREE.Vector3(0.8, 0, -0.8), new THREE.Vector3(-0.8, 0, 0.8)];
            const frameGeo = new THREE.BufferGeometry().setFromPoints(points);
            droneGroup.add(new THREE.LineSegments(frameGeo, frameMat));

            const propGeo = new THREE.CircleGeometry(0.3, 8);
            const propMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.4 });
            [[-0.8,0,-0.8], [0.8,0,-0.8], [0.8,0,0.8], [-0.8,0,0.8]].forEach(p => {
                const prop = new THREE.Mesh(propGeo, propMat);
                prop.position.set(...p); prop.rotation.x = Math.PI / 2;
                droneGroup.add(prop);
            });
            scene.add(droneGroup);
        }

        function spawnObject(type, x, z) {
            const group = new THREE.Group();
            let size = [1,1,1], color = 0x00ff00, moveSpeed = 0;

            if(type === 'car') { 
                size = [2, 1.2, 4]; color = 0xff3300; moveSpeed = 12 + Math.random() * 10; 
            } else if(type === 'human') { 
                size = [0.5, 1.7, 0.5]; color = 0xffcc00; moveSpeed = 3 + Math.random() * 2; 
            } else if(type === 'house') { 
                const rand = Math.random();
                if(rand > 0.7) size = [8+Math.random()*5, 40+Math.random()*60, 8+Math.random()*5];
                else if(rand > 0.3) size = [15+Math.random()*10, 10+Math.random()*15, 15+Math.random()*10];
                else size = [10+Math.random()*5, 20+Math.random()*20, 10+Math.random()*5];
                color = 0x4444ff;
            }
            
            const mesh = new THREE.LineSegments(
                new THREE.EdgesGeometry(new THREE.BoxGeometry(...size)), 
                new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.8 })
            );
            group.add(mesh);
            group.position.set(x, size[1]/2, z);
            scene.add(group);
            
            const ent = { 
                mesh: group, type, 
                radius: (size[0] + size[2]) / 4,
                height: size[1],
                speed: moveSpeed, 
                dir: new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0,1,0), Math.random() * Math.PI * 2) 
            };
            
            if (type === 'house') staticObstacles.push(ent); else entities.push(ent);
        }

        function updateChunks() {
            const curX = Math.floor(droneState.pos.x / CHUNK_SIZE);
            const curZ = Math.floor(droneState.pos.z / CHUNK_SIZE);
            for (let x = curX - 1; x <= curX + 1; x++) {
                for (let z = curZ - 1; z <= curZ + 1; z++) {
                    const id = `${x},${z}`;
                    if (!activeChunks.has(id)) { generateChunk(x * CHUNK_SIZE, z * CHUNK_SIZE); activeChunks.add(id); }
                }
            }
        }

        function generateChunk(ox, oz) {
            for(let i=0; i<8; i++) spawnObject('house', ox + (Math.random()-0.5)*CHUNK_SIZE, oz + (Math.random()-0.5)*CHUNK_SIZE);
            for(let i=0; i<3; i++) {
                spawnObject('car', ox + (Math.random()-0.5)*CHUNK_SIZE, oz + (Math.random()-0.5)*CHUNK_SIZE);
                spawnObject('human', ox + (Math.random()-0.5)*CHUNK_SIZE, oz + (Math.random()-0.5)*CHUNK_SIZE);
            }
        }

        function updateMinimap() {
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.save();
            mCtx.translate(mCanvas.width/2, mCanvas.height/2);
            mCtx.rotate(droneState.rotY);
            const scale = 0.5;
            [...staticObstacles, ...entities].forEach(ent => {
                const dx = (ent.mesh.position.x - droneState.pos.x) * scale;
                const dz = (ent.mesh.position.z - droneState.pos.z) * scale;
                if(Math.abs(dx) < 60 && Math.abs(dz) < 60) {
                    mCtx.fillStyle = ent.type === 'house' ? 'rgba(68, 68, 255, 0.4)' : (ent.type === 'car' ? '#ff3300' : '#ffcc00');
                    mCtx.fillRect(dx - 1, dz - 1, 2, 2);
                }
            });
            mCtx.restore();
        }

        function updateSeeker() {
            let bestTarget = null;
            let minDist = 100;
            const targetUI = document.getElementById('target-ui');

            entities.forEach(en => {
                const dist = droneState.pos.distanceTo(en.mesh.position);
                if (dist < minDist) {
                    const screenPos = en.mesh.position.clone().project(camera);
                    if (Math.abs(screenPos.z) < 1 && Math.abs(screenPos.x) < 0.8 && Math.abs(screenPos.y) < 0.8) {
                        minDist = dist;
                        bestTarget = { x: (screenPos.x * 0.5 + 0.5) * window.innerWidth, y: (screenPos.y * -0.5 + 0.5) * window.innerHeight };
                    }
                }
            });

            if (bestTarget) {
                targetUI.style.display = 'block';
                targetUI.style.left = bestTarget.x + 'px';
                targetUI.style.top = bestTarget.y + 'px';
                const s = Math.max(25, 120 - minDist);
                targetUI.style.width = targetUI.style.height = s + 'px';
            } else { targetUI.style.display = 'none'; }
        }

        function showHit() {
            const h = document.getElementById('hit-marker');
            h.style.display = 'block';
            setTimeout(() => h.style.display = 'none', 1000);
        }

        let input = { left: {x:0, y:0}, right: {x:0, y:0} };
        function initJoysticks() {
            nipplejs.create({ zone: document.getElementById('joystick-left'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'green' })
                .on('move', (e, d) => input.left = d.vector).on('end', () => input.left = {x:0, y:0});
            nipplejs.create({ zone: document.getElementById('joystick-right'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'white' })
                .on('move', (e, d) => input.right = d.vector).on('end', () => input.right = {x:0, y:0});
        }

        createGround();
        createDroneModel();
        initJoysticks();

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            updateChunks();
            updateMinimap();
            updateSeeker();

            // ИСПРАВЛЕННАЯ ЛОГИКА МЕРЦАНИЯ
            if (gridHelper && gridHelper.material) {
                const alt = droneState.pos.y;
                if (alt < 5.0) {
                    const intensity = Math.max(0, 1 - (alt / 5.0));
                    const flash = (Math.sin(time * 20) * 0.5 + 0.5) * intensity;
                    // Прямое управление цветом через RGB
                    gridHelper.material.color.setRGB(flash, 1 - intensity, 0);
                } else {
                    gridHelper.material.color.setHex(0x00ff00);
                }
            }

            droneState.rotY -= input.left.x * PHYSICS.rotationSpeed * dt;
            droneState.tiltX = THREE.MathUtils.lerp(droneState.tiltX, -input.right.y * PHYSICS.tiltMax, 0.1);
            droneState.tiltZ = THREE.MathUtils.lerp(droneState.tiltZ, -input.right.x * PHYSICS.tiltMax, 0.1);

            const moveDir = new THREE.Vector3(input.right.x, 0, -input.right.y).applyAxisAngle(new THREE.Vector3(0, 1, 0), droneState.rotY);
            droneState.vel.addScaledVector(moveDir, PHYSICS.acceleration * dt);
            droneState.vel.y += (input.left.y * PHYSICS.lift - 9.81) * dt;
            droneState.vel.multiplyScalar(PHYSICS.friction);
            droneState.pos.addScaledVector(droneState.vel, dt);

            droneGroup.position.copy(droneState.pos);
            droneGroup.rotation.set(0, 0, 0);
            droneGroup.rotateY(droneState.rotY);
            droneGroup.rotateX(droneState.tiltX);
            droneGroup.rotateZ(droneState.tiltZ);
            droneGroup.children.filter(c => c.type === "Mesh").forEach(p => p.rotation.z += 0.8);

            camera.position.lerp(droneState.pos.clone().add(new THREE.Vector3(0, 3, 8).applyAxisAngle(new THREE.Vector3(0, 1, 0), droneState.rotY)), 0.12);
            camera.lookAt(droneState.pos.clone().add(new THREE.Vector3(0, -1, 0)));

            entities.forEach((en, i) => {
                en.mesh.position.addScaledVector(en.dir, en.speed * dt);
                if (droneState.pos.distanceTo(en.mesh.position) < (en.radius + 1.2)) {
                    score += (en.type === 'car' ? 20 : 10);
                    document.getElementById('score').innerText = `SCORE: ${score}`;
                    showHit();
                    scene.remove(en.mesh); entities.splice(i, 1);
                }
            });

            staticObstacles.forEach(h => {
                const distXZ = new THREE.Vector2(droneState.pos.x, droneState.pos.z).distanceTo(new THREE.Vector2(h.mesh.position.x, h.mesh.position.z));
                if (distXZ < h.radius && droneState.pos.y < h.height) isGameOver = true;
            });

            if(droneState.pos.y < 0 || isGameOver) {
                isGameOver = true;
                document.getElementById('restart-screen').style.display = 'block';
            }

            document.getElementById('alt').innerText = `ALT: ${droneState.pos.y.toFixed(1)}m`;
            document.getElementById('spd').innerText = `SPD: ${(droneState.vel.length() * 3.6).toFixed(0)}km/h`;
            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
